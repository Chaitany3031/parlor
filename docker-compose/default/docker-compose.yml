services:
  userdb:
    image: mysql:8.0.46
    container_name: userdb
    ports:
      - 3301:3306
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: userdb
    networks:
      - angels

  bookingdb:
    image: mysql:8.0.46
    container_name: bookingdb
    ports:
      - 3302:3306
    healthcheck:
      test: [ "CMD","mysqladmin","ping","-h","localhost" ]
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookingdb
    networks:
      - angels

  categorydb:
    image: mysql:8.0.46
    container_name: categorydb
    ports:
      - 3303:3306
    healthcheck:
      test: [ "CMD","mysqladmin","ping","-h","localhost" ]
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: categorydb
    networks:
      - angels

  paymentdb:
    image: mysql:8.0.46
    container_name: paymentdb
    ports:
      - 3304:3306
    healthcheck:
      test: [ "CMD","mysqladmin","ping","-h","localhost" ]
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paymentdb
    networks:
      - angels

  salondb:
    image: mysql:8.0.46
    container_name: salondb
    ports:
      - 3305:3306
    healthcheck:
      test: [ "CMD","mysqladmin","ping","-h","localhost" ]
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: salondb
    networks:
      - angels

  service-offeringdb:
    image: mysql:8.0.46
    container_name: service-offeringdb
    ports:
      - 3308:3306
    healthcheck:
      test: [ "CMD","mysqladmin","ping","-h","localhost" ]
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: service-offeringdb
    networks:
      - angels

  eurekaserver:
    image: "chaitanya3031/salon-eureka-server:v1"
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD-SHELL","curl --fail --silent eurekaserver:8070/actuator/health/readiness | grep UP || exist 1"]
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    container_name: eurekaserver

    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - angels

  user:
    image: "chaitanya3031/salon-user:v1"
    ports:
      - "5001:5001"
    healthcheck:
      test: "curl --fail --silent user:5001/actuator/health/readiness | grep UP || exist 1"
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    container_name: user
    depends_on:
      userdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-offering"
      SPRING_DATASOURCE_URL: "jdbc:mysql://userdb:3306/userdb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - angels

  booking:
    image: "chaitanya3031/booking-service:v1"
    ports:
      - "5005:5005"
    healthcheck:
      test: "curl --fail --silent booking:5005/actuator/health/readiness | grep UP || exist 1"
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    container_name: booking
    depends_on:
      bookingdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "booking-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://bookingdb:3306/bookingdb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - angels

  category:
    image: "chaitanya3031/category-service:v1"
    ports:
      - "5003:5003"
    healthcheck:
      test: "curl --fail --silent category:5003/actuator/health/readiness | grep UP || exist 1"
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    container_name: category
    depends_on:
      categorydb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "category-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://categorydb:3306/categorydb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - angels

  payment:
    image: "chaitanya3031/payment-service:v1"
    ports:
      - "5006:5006"
    healthcheck:
      test: "curl --fail --silent payment:5006/actuator/health/readiness | grep UP || exist 1"
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    container_name: payment
    depends_on:
      paymentdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "payment-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://paymentdb:3306/paymentdb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - angels

  salon:
    image: "chaitanya3031/salon-service:v1"
    ports:
      - "5002:5002"
    healthcheck:
      test: "curl --fail --silent salon:5002/actuator/health/readiness | grep UP || exist 1"
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    container_name: salon
    depends_on:
      salondb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "salon-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://salondb:3306/salondb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - angels

  service-offering:
    image: "chaitanya3031/salon-service-offering:v1"
    ports:
      - "5004:5004"
    healthcheck:
      test: "curl --fail --silent service-offering:5004/actuator/health/readiness | grep UP || exist 1"
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    container_name: service-offering
    depends_on:
      service-offeringdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "service-offering"
      SPRING_DATASOURCE_URL: "jdbc:mysql://service-offeringdb:3306/service-offeringdb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - angels

  gatewayserver:
    image: "chaitanya3031/salon-gateway-server:v1"
    ports:
      - "5000:5000"
    healthcheck:
      test: "curl --fail --silent gatewayserver:5000/actuator/health/readiness | grep UP || exist 1"
      interval: 300s
      timeout: 5s
      retries: 10
      start_period: 300s
    container_name: gatewayserver
#    depends_on:
#      userdb:
#        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "gateway-server"
#      SPRING_DATASOURCE_URL: "jdbc:mysql://service-offeringdb:3306/service-offeringdb"
#      SPRING_DATASOURCE_USERNAME: root
#      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - angels

